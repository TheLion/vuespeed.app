<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedankt — VueSpeed</title>
    <link rel="canonical" href="https://vuespeed.app/support/bedankt">
    <style>
        :root {
            --bg: #08080f;
            --blue: #3399FF;
            --text: #e8e8ed;
            --text-muted: #8888a0;
            --green: #34c759;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            text-align: center;
            max-width: 400px;
            padding: 48px 32px;
        }

        .checkmark {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(52, 199, 89, 0.12);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .checkmark svg {
            width: 32px;
            height: 32px;
            color: var(--green);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        a {
            color: var(--blue);
            text-decoration: none;
            font-size: 14px;
        }

        a:hover { text-decoration: underline; }

        .lang-content { display: none; }
        .lang-content.active { display: block; }
    </style>
    <script
        src="https://cdn.telemetrydeck.com/websdk/telemetrydeck.min.js"
        data-app-id="4B3D3BEC-3DE4-461F-A252-276D9A003F5C"
    ></script>
</head>
<body>
    <div class="card">
        <div class="checkmark">
            <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
        </div>

        <div id="lang-nl" class="lang-content active">
            <h1>Bedankt!</h1>
            <p>Je bericht is verstuurd. We reageren zo snel mogelijk op <strong style="color: var(--text);">hello@vuespeed.app</strong>.</p>
            <a href="/">&larr; Terug naar VueSpeed</a>
        </div>

        <div id="lang-en" class="lang-content">
            <h1>Thank you!</h1>
            <p>Your message has been sent. We'll reply as soon as possible at <strong style="color: var(--text);">hello@vuespeed.app</strong>.</p>
            <a href="/">&larr; Back to VueSpeed</a>
        </div>
    </div>

    <script>
        var saved = localStorage.getItem('vuespeed-lang');
        if (saved && saved !== 'nl') {
            document.getElementById('lang-nl').classList.remove('active');
            document.getElementById('lang-' + saved).classList.add('active');
            document.documentElement.lang = saved;
        }
    </script>
    <script type="module">
        import TelemetryDeck from 'https://unpkg.com/@telemetrydeck/sdk@2.0.4/dist/telemetrydeck.js';
        var uid = sessionStorage.getItem('td_uid') || 'web-anonymous';
        var td = new TelemetryDeck({ appID: '4B3D3BEC-3DE4-461F-A252-276D9A003F5C', clientUser: uid });
        td.signal('supportFormSubmitted');
    </script>
</body>
</html>
