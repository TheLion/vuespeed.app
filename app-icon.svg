<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arcFill" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00BBFF"/>
      <stop offset="100%" stop-color="#00E88C"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="28" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="borderGlow">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="ambient" cx="512" cy="450" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00BBFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00BBFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#10101c"/>
  <rect width="1024" height="1024" fill="url(#ambient)"/>

  <!-- Glowing border -->
  <rect x="8" y="8" width="1008" height="1008" rx="224" fill="none" stroke="#00BBFF" stroke-width="16" opacity="0.25" filter="url(#borderGlow)"/>

  <!-- Gauge group, shifted down 50px for optical centering -->
  <g transform="translate(0,50)">
    <!-- Track arc (dim, full 240°) -->
    <path d="M209,687 A350,350 0 1,1 815,687" fill="none" stroke="#00BBFF" stroke-width="44" stroke-linecap="round" opacity="0.1"/>

    <!-- Tapered filled arc (cyan→green gradient) -->
    <path d="M206,689 L178,634 L161,574 L154,512 L158,450 L173,389 L199,331 L234,279 L278,233 L329,195 L386,167 L448,149 L512,142 L576,146 L640,162 L699,188 L753,225 L801,270 L839,323 L791,351 L760,304 L721,263 L675,230 L624,204 L569,188 L512,182 L455,186 L398,199 L345,223 L297,255 L254,296 L219,343 L193,396 L177,453 L170,512 L174,572 L188,630 L212,685 Z" fill="url(#arcFill)" filter="url(#glow)"/>

    <!-- Middle decorative ring -->
    <circle cx="512" cy="512" r="260" fill="none" stroke="url(#arcFill)" stroke-width="22" opacity="0.25" filter="url(#glow)"/>

    <!-- Inner decorative ring -->
    <circle cx="512" cy="512" r="150" fill="none" stroke="#00BBFF" stroke-width="10" opacity="0.12" filter="url(#glow)"/>

    <!-- Tick marks -->
    <g stroke="#FFFFFF" stroke-linecap="round" stroke-width="10">
      <line x1="512" y1="142" x2="512" y2="210" opacity="0.55" transform="rotate(-120,512,512)"/>
      <line x1="512" y1="142" x2="512" y2="210" opacity="0.6" transform="rotate(-80,512,512)"/>
      <line x1="512" y1="142" x2="512" y2="210" opacity="0.65" transform="rotate(-40,512,512)"/>
      <line x1="512" y1="142" x2="512" y2="210" opacity="0.9" transform="rotate(0,512,512)"/>
      <line x1="512" y1="142" x2="512" y2="210" opacity="0.95" transform="rotate(40,512,512)"/>
      <line x1="512" y1="142" x2="512" y2="210" opacity="0.95" transform="rotate(80,512,512)"/>
      <line x1="512" y1="142" x2="512" y2="210" opacity="0.85" transform="rotate(120,512,512)"/>
    </g>

    <!-- Needle (48° from top = ~170 km/h) -->
    <g transform="rotate(48,512,512)">
      <polygon points="504,195 512,490 520,195" fill="#00E88C" filter="url(#glow)"/>
      <polygon points="508,205 512,460 516,205" fill="#FFFFFF" opacity="0.6"/>
    </g>

    <!-- Center hub -->
    <circle cx="512" cy="512" r="50" fill="#0a0a14" stroke="#00BBFF" stroke-width="3" opacity="0.5"/>
    <circle cx="512" cy="512" r="22" fill="#00E88C" opacity="0.5" filter="url(#glowBig)"/>
    <circle cx="512" cy="512" r="10" fill="#00E88C"/>
    <circle cx="512" cy="512" r="4" fill="#FFFFFF"/>
  </g>
</svg>
